name: travel_ecuador
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.15.4

  # GPS
  geolocator: ^10.1.0

  # HTTP para llamadas API
  http: ^1.1.0

  # Selección de imágenes
  image_picker: ^1.1.2


  fl_chart: ^0.55.2

  # Para manejo de rutas
  path: ^1.9.0

  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.5
  webview_flutter: ^4.10.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true

  assets:
  - assets/icon/
  - assets/icon/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/icon.png
  color_dark: "#1A1A1A"
  image_dark: assets/icon/icon.png

  android_12:
    image: assets/icon/icon.png
    icon_background_color: "#FFFFFF"
    image_dark: assets/icon/icon.png
    icon_background_color_dark: "#1A1A1A"

  web: true
